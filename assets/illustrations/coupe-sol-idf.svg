<?xml version="1.0" encoding="UTF-8"?>
<!--
  Illustration éditoriale : coupe géologique simplifiée du sous-sol IDF.
  Strates dominantes : remblais, calcaire grossier, argiles plastiques, marnes,
  gypse (rive droite Paris), sables de Fontainebleau (sud), avec une fissure
  dessinée traversant la maison + le sol.
  À utiliser sur le pilier régional + pages dépt comme visuel d'autorité.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="cs-title cs-desc">
  <title id="cs-title">Coupe géologique simplifiée du sous-sol d'Île-de-France</title>
  <desc id="cs-desc">Illustration éditoriale montrant les strates de remblais, calcaire, argiles, marnes et gypse, avec une maison fissurée en surface.</desc>

  <defs>
    <pattern id="hatch-fine" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#3a3a3a" stroke-width="0.5"/>
    </pattern>
    <pattern id="hatch-bold" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#3a3a3a" stroke-width="0.7"/>
    </pattern>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="2" r="1" fill="#3a3a3a"/>
    </pattern>
  </defs>

  <!-- Ciel (espace vide, sobriété) -->
  <rect x="0" y="0" width="800" height="160" fill="#f5f1ea"/>

  <!-- Surface (terrain naturel) -->
  <line x1="0" y1="160" x2="800" y2="160" stroke="#111" stroke-width="1.5"/>

  <!-- Strate 1 : Remblais / limons -->
  <rect x="0" y="160" width="800" height="40" fill="#ede7dc"/>
  <rect x="0" y="160" width="800" height="40" fill="url(#dots)" opacity="0.5"/>

  <!-- Strate 2 : Argiles plastiques (sensibles au RGA) — soulignée en ocre -->
  <rect x="0" y="200" width="800" height="80" fill="#e6dfd2"/>
  <rect x="0" y="200" width="800" height="80" fill="url(#hatch-fine)" opacity="0.4"/>

  <!-- Bande d'accent ocre = signature de l'argile sensible -->
  <rect x="0" y="200" width="800" height="3" fill="#b8552e"/>

  <!-- Strate 3 : Marnes / calcaire grossier -->
  <rect x="0" y="280" width="800" height="100" fill="#d5cdbd"/>
  <rect x="0" y="280" width="800" height="100" fill="url(#hatch-bold)" opacity="0.3"/>

  <!-- Strate 4 : Gypse / craie en profondeur -->
  <rect x="0" y="380" width="800" height="120" fill="#c8c0af"/>

  <!-- Maison stylisée (silhouette ligne) -->
  <g transform="translate(310, 60)" stroke="#111" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Toit -->
    <path d="M0 50 L90 0 L180 50"/>
    <!-- Murs -->
    <path d="M15 50 L15 100 L165 100 L165 50"/>
    <!-- Porte -->
    <path d="M75 100 L75 70 L105 70 L105 100"/>
    <!-- Fenêtre -->
    <rect x="30" y="65" width="25" height="20"/>
    <rect x="125" y="65" width="25" height="20"/>
  </g>

  <!-- Fissure traversante (signature graphique) -->
  <path d="M395 60 L398 75 L390 95 L405 115 L395 135 L408 158 L402 178 L420 210 L410 245 L425 280 L420 320 L435 360"
        stroke="#b8552e" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.92"/>

  <!-- Légendes des strates -->
  <g font-family="Sora, system-ui, sans-serif" font-size="11" fill="#3a3a3a">
    <text x="20" y="178" letter-spacing="1.2" text-transform="uppercase">REMBLAIS · LIMONS</text>
    <text x="20" y="220" letter-spacing="1.2" fill="#b8552e" font-weight="500">ARGILES PLASTIQUES — SENSIBLES AU RGA</text>
    <text x="20" y="312" letter-spacing="1.2">MARNES · CALCAIRE GROSSIER</text>
    <text x="20" y="412" letter-spacing="1.2">GYPSE · CRAIE</text>
  </g>

  <!-- Cote profondeur indicative (italique, éditorial) -->
  <g font-family="Fraunces, Georgia, serif" font-style="italic" font-size="13" fill="#111">
    <text x="700" y="200" text-anchor="end">– 2 m</text>
    <text x="700" y="280" text-anchor="end">– 6 m</text>
    <text x="700" y="380" text-anchor="end">– 12 m</text>
  </g>
</svg>
