<?xml version="1.0" encoding="UTF-8"?>
<!--
  Carte éditoriale Île-de-France — 8 départements.
  Chargée via <object> dans le footer : tous les styles sont inline.
  Inspiration : cartographie scientifique vintage, Le Monde Diplomatique, NYT graphics.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 440"
     role="img"
     aria-labelledby="carte-idf-title carte-idf-desc">
  <title id="carte-idf-title">Île-de-France — 8 départements</title>
  <desc id="carte-idf-desc">Carte stylisée des départements 75 Paris, 77 Seine-et-Marne, 78 Yvelines, 91 Essonne, 92 Hauts-de-Seine, 93 Seine-Saint-Denis, 94 Val-de-Marne et 95 Val-d'Oise. Chaque département est un lien vers sa page locale.</desc>

  <defs>
    <style><![CDATA[
      .dept-shape {
        fill: rgba(245, 241, 234, 0.045);
        stroke: rgba(245, 241, 234, 0.42);
        stroke-width: 0.7;
        stroke-linejoin: round;
        transition: fill 320ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    stroke 320ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    stroke-width 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .dept-shape.is-paris {
        fill: rgba(184, 85, 46, 0.18);
        stroke: rgba(184, 85, 46, 0.55);
      }
      a:hover .dept-shape,
      a:focus-visible .dept-shape {
        fill: rgba(184, 85, 46, 0.5);
        stroke: rgba(212, 121, 77, 0.95);
        stroke-width: 1;
      }
      a:hover .dept-num,
      a:focus-visible .dept-num,
      a:hover .dept-name,
      a:focus-visible .dept-name {
        fill: #f5f1ea;
      }
      .dept-num {
        fill: rgba(245, 241, 234, 0.88);
        font-family: 'Fraunces', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        font-size: 13px;
        font-style: italic;
        font-weight: 400;
        text-anchor: middle;
        pointer-events: none;
        transition: fill 320ms ease;
      }
      .dept-name {
        fill: rgba(245, 241, 234, 0.55);
        font-family: 'Sora', 'Helvetica Neue', system-ui, sans-serif;
        font-size: 6.4px;
        font-weight: 400;
        text-anchor: middle;
        pointer-events: none;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        transition: fill 320ms ease;
      }
      .seine {
        fill: none;
        stroke: rgba(184, 85, 46, 0.42);
        stroke-width: 0.7;
        stroke-linecap: round;
        stroke-dasharray: 2.4 2.6;
      }
      .seine-label {
        fill: rgba(184, 85, 46, 0.7);
        font-family: 'Fraunces', Georgia, serif;
        font-size: 7px;
        font-style: italic;
        text-anchor: middle;
      }
      .legend {
        fill: rgba(245, 241, 234, 0.42);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 6.5px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .legend-soft {
        fill: rgba(245, 241, 234, 0.3);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 5.5px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .legend-num {
        fill: rgba(245, 241, 234, 0.4);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 5.5px;
        letter-spacing: 0;
      }
      .frame-line {
        stroke: rgba(245, 241, 234, 0.32);
        stroke-width: 0.55;
        fill: none;
      }
      .grid-line {
        stroke: rgba(245, 241, 234, 0.06);
        stroke-width: 0.4;
        fill: none;
      }
      .compass-needle {
        fill: rgba(184, 85, 46, 0.78);
      }
      .compass-needle-soft {
        fill: rgba(245, 241, 234, 0.22);
      }
      .compass-line {
        stroke: rgba(245, 241, 234, 0.32);
        stroke-width: 0.5;
        fill: none;
      }
      .compass-label {
        fill: rgba(245, 241, 234, 0.55);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 5.5px;
        letter-spacing: 0.15em;
        font-weight: 600;
      }
      .scale-bar {
        stroke: rgba(245, 241, 234, 0.45);
        stroke-width: 0.6;
        fill: none;
      }
    ]]></style>
  </defs>

  <!-- ===== Editorial chrome ===== -->

  <!-- Cartographic micro-grid -->
  <g aria-hidden="true">
    <line class="grid-line" x1="120" y1="60" x2="120" y2="396"/>
    <line class="grid-line" x1="240" y1="60" x2="240" y2="396"/>
    <line class="grid-line" x1="360" y1="60" x2="360" y2="396"/>
    <line class="grid-line" x1="40" y1="125" x2="440" y2="125"/>
    <line class="grid-line" x1="40" y1="220" x2="440" y2="220"/>
    <line class="grid-line" x1="40" y1="315" x2="440" y2="315"/>
  </g>

  <!-- Frame corner marks -->
  <g aria-hidden="true">
    <path class="frame-line" d="M 22,22 L 22,38 M 22,22 L 38,22"/>
    <path class="frame-line" d="M 458,22 L 458,38 M 458,22 L 442,22"/>
    <path class="frame-line" d="M 22,418 L 22,402 M 22,418 L 38,418"/>
    <path class="frame-line" d="M 458,418 L 458,402 M 458,418 L 442,418"/>
  </g>

  <!-- Header -->
  <text class="legend" x="30" y="36">Région Île-de-France</text>
  <text class="legend-soft" x="30" y="48">8 départements · expertise fissure</text>

  <!-- Compass rose (top-right) -->
  <g transform="translate(440, 50)" aria-hidden="true">
    <circle class="compass-line" r="14"/>
    <line class="compass-line" x1="0" y1="-16" x2="0" y2="16"/>
    <line class="compass-line" x1="-16" y1="0" x2="16" y2="0"/>
    <path class="compass-needle" d="M 0,-15 L -3.5,-1 L 0,1 L 3.5,-1 Z"/>
    <path class="compass-needle-soft" d="M 0,15 L -3.5,1 L 0,-1 L 3.5,1 Z"/>
    <text class="compass-label" x="0" y="-19" text-anchor="middle">N</text>
  </g>

  <!-- ===== La Seine (decorative river path) ===== -->
  <!-- Trajet SE → NW : entre par 77, traverse 94 puis Paris, longe 92 et sort par 78/95 -->
  <path class="seine" d="
    M 432,348
    Q 405,330 380,310
    Q 355,290 330,272
    Q 305,252 282,238
    Q 258,224 235,225
    Q 215,228 195,218
    Q 172,205 148,210
    Q 122,218 95,210
    Q 70,200 50,182
  "/>
  <text class="seine-label" x="148" y="201" transform="rotate(-4 148 201)">la Seine</text>

  <!-- ===== DÉPARTEMENTS ===== -->
  <!-- Z-order : grande couronne d'abord, petite couronne ensuite, Paris en dernier (au-dessus). -->

  <!-- 95 Val-d'Oise (nord) -->
  <a href="/95/" target="_top" aria-label="Expert fissure Val-d'Oise (95)">
    <path class="dept-shape" d="
      M 92,92
      Q 102,72 122,62
      Q 158,52 198,55
      Q 235,52 275,60
      Q 318,68 350,82
      Q 365,98 358,118
      Q 332,128 300,130
      Q 268,128 232,135
      Q 200,135 168,138
      Q 130,135 102,128
      Q 86,118 92,92
      Z
    "/>
    <text class="dept-num" x="220" y="100">95</text>
    <text class="dept-name" x="220" y="112">Val-d'Oise</text>
  </a>

  <!-- 78 Yvelines (ouest) -->
  <a href="/78/" target="_top" aria-label="Expert fissure Yvelines (78)">
    <path class="dept-shape" d="
      M 86,118
      Q 102,128 115,148
      Q 132,170 142,195
      Q 145,225 138,255
      Q 130,280 115,300
      Q 95,318 70,318
      Q 50,310 38,290
      Q 28,260 28,225
      Q 32,188 45,158
      Q 60,132 78,118
      Q 82,116 86,118
      Z
    "/>
    <text class="dept-num" x="80" y="225">78</text>
    <text class="dept-name" x="80" y="238">Yvelines</text>
  </a>

  <!-- 77 Seine-et-Marne (est, le plus étendu) -->
  <a href="/77/" target="_top" aria-label="Expert fissure Seine-et-Marne (77)">
    <path class="dept-shape" d="
      M 350,82
      Q 388,90 415,108
      Q 438,135 448,170
      Q 458,210 455,255
      Q 450,300 432,335
      Q 408,365 372,378
      Q 338,385 312,372
      Q 295,355 295,325
      Q 298,290 312,255
      Q 322,222 328,188
      Q 333,152 340,118
      Q 345,98 350,82
      Z
    "/>
    <text class="dept-num" x="378" y="232">77</text>
    <text class="dept-name" x="378" y="244">Seine-et-Marne</text>
  </a>

  <!-- 91 Essonne (sud) -->
  <a href="/91/" target="_top" aria-label="Expert fissure Essonne (91)">
    <path class="dept-shape" d="
      M 115,300
      Q 145,308 178,316
      Q 215,322 252,322
      Q 282,322 295,328
      Q 298,355 278,378
      Q 248,395 210,398
      Q 168,395 132,382
      Q 102,365 82,338
      Q 75,318 88,308
      Q 100,302 115,300
      Z
    "/>
    <text class="dept-num" x="188" y="358">91</text>
    <text class="dept-name" x="188" y="370">Essonne</text>
  </a>

  <!-- 93 Seine-Saint-Denis (NE petite couronne) -->
  <a href="/93/" target="_top" aria-label="Expert fissure Seine-Saint-Denis (93)">
    <path class="dept-shape" d="
      M 232,138
      Q 258,135 288,142
      Q 305,152 305,170
      Q 298,188 282,194
      Q 262,196 244,193
      Q 226,188 218,175
      Q 218,155 232,138
      Z
    "/>
    <text class="dept-num" x="262" y="166">93</text>
    <text class="dept-name" x="262" y="178">S.-St-Denis</text>
  </a>

  <!-- 92 Hauts-de-Seine (O petite couronne) -->
  <a href="/92/" target="_top" aria-label="Expert fissure Hauts-de-Seine (92)">
    <path class="dept-shape" d="
      M 175,165
      Q 195,158 215,163
      Q 222,170 222,190
      Q 220,222 218,250
      Q 212,270 192,272
      Q 168,268 156,248
      Q 150,222 152,195
      Q 158,175 175,165
      Z
    "/>
    <text class="dept-num" x="190" y="218">92</text>
    <text class="dept-name" x="190" y="230">Hts-de-Seine</text>
  </a>

  <!-- 94 Val-de-Marne (SE petite couronne) -->
  <a href="/94/" target="_top" aria-label="Expert fissure Val-de-Marne (94)">
    <path class="dept-shape" d="
      M 232,232
      Q 254,228 278,235
      Q 298,248 300,275
      Q 295,300 274,308
      Q 252,310 230,302
      Q 215,288 215,265
      Q 218,242 232,232
      Z
    "/>
    <text class="dept-num" x="260" y="270">94</text>
    <text class="dept-name" x="260" y="282">Val-de-Marne</text>
  </a>

  <!-- 75 Paris (centre) -->
  <a href="/75/" target="_top" aria-label="Expert fissure Paris (75)">
    <path class="dept-shape is-paris" d="
      M 222,196
      Q 235,189 250,195
      Q 262,205 260,220
      Q 252,232 232,232
      Q 220,228 218,215
      Q 217,202 222,196
      Z
    "/>
    <text class="dept-num" x="238" y="217">75</text>
  </a>

  <!-- ===== Bottom legend ===== -->

  <!-- Scale bar -->
  <g transform="translate(30, 408)" aria-hidden="true">
    <path class="scale-bar" d="M 0,0 L 60,0"/>
    <path class="scale-bar" d="M 0,-2.5 L 0,2.5 M 30,-2.5 L 30,2.5 M 60,-2.5 L 60,2.5"/>
    <text class="legend-num" x="0" y="11">0</text>
    <text class="legend-num" x="60" y="11" text-anchor="end">~50 km</text>
  </g>

  <!-- Right inscription -->
  <text class="legend-soft" x="450" y="412" text-anchor="end">Cabinet · 24 h délai contact</text>

</svg>
