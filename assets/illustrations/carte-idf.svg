<?xml version="1.0" encoding="UTF-8"?>
<!--
  Carte éditoriale Île-de-France - 8 départements.
  Silhouettes basées sur données IGN (france-geojson, gregoire davide).
  Projection equirectangulaire avec correction cos(lat) à 48.68° N.
  Simplification Douglas-Peucker à 0.7 km.
  Chargée via <object> dans le footer : tous styles inline.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 440"
     role="img"
     aria-labelledby="carte-idf-title carte-idf-desc">
  <title id="carte-idf-title">Île-de-France - 8 départements</title>
  <desc id="carte-idf-desc">Carte des départements 75 Paris, 77 Seine-et-Marne, 78 Yvelines, 91 Essonne, 92 Hauts-de-Seine, 93 Seine-Saint-Denis, 94 Val-de-Marne et 95 Val-d'Oise. Chaque département est cliquable.</desc>

  <defs>
    <style><![CDATA[
      .dept-shape {
        fill: rgba(245, 241, 234, 0.05);
        stroke: rgba(245, 241, 234, 0.45);
        stroke-width: 0.6;
        stroke-linejoin: round;
        stroke-linecap: round;
        transition: fill 320ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    stroke 320ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    stroke-width 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .dept-shape.is-paris {
        fill: rgba(184, 85, 46, 0.22);
        stroke: rgba(184, 85, 46, 0.7);
        stroke-width: 0.8;
      }
      a:hover .dept-shape,
      a:focus-visible .dept-shape {
        fill: rgba(184, 85, 46, 0.55);
        stroke: rgba(212, 121, 77, 1);
        stroke-width: 1;
      }
      a:hover .dept-num,
      a:focus-visible .dept-num,
      a:hover .dept-name,
      a:focus-visible .dept-name {
        fill: #f5f1ea;
      }
      .dept-num {
        fill: rgba(245, 241, 234, 0.92);
        font-family: 'Fraunces', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        font-size: 13px;
        font-style: italic;
        font-weight: 500;
        text-anchor: middle;
        pointer-events: none;
        transition: fill 320ms ease;
      }
      .dept-name {
        fill: rgba(245, 241, 234, 0.55);
        font-family: 'Sora', 'Helvetica Neue', system-ui, sans-serif;
        font-size: 6.5px;
        font-weight: 400;
        text-anchor: middle;
        pointer-events: none;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        transition: fill 320ms ease;
      }
      .legend {
        fill: rgba(245, 241, 234, 0.45);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 6.5px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .legend-soft {
        fill: rgba(245, 241, 234, 0.32);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 5.5px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .legend-num {
        fill: rgba(245, 241, 234, 0.4);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 5.5px;
      }
      .frame-line {
        stroke: rgba(245, 241, 234, 0.32);
        stroke-width: 0.55;
        fill: none;
      }
      .grid-line {
        stroke: rgba(245, 241, 234, 0.06);
        stroke-width: 0.4;
        fill: none;
      }
      .compass-line {
        stroke: rgba(245, 241, 234, 0.32);
        stroke-width: 0.5;
        fill: none;
      }
      .compass-needle {
        fill: rgba(184, 85, 46, 0.8);
      }
      .compass-needle-soft {
        fill: rgba(245, 241, 234, 0.22);
      }
      .compass-label {
        fill: rgba(245, 241, 234, 0.55);
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 5.5px;
        letter-spacing: 0.15em;
        font-weight: 600;
      }
      .scale-bar {
        stroke: rgba(245, 241, 234, 0.45);
        stroke-width: 0.6;
        fill: none;
      }
    ]]></style>
  </defs>

